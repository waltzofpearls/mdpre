name: Just build no release
on:
  #push: # uncomment this for testing and debugging because it triggers build on every git push
  workflow_dispatch: # allow the workflow to be triggered manually

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: List available Xcode versions
        run: ls /Applications | grep Xcode
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'
      - name: Show current version of Xcode
        run: xcodebuild -version
      - name: Import macOS app signing certificate
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATES_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATES_PASSWORD }}
      - name: Install gon and create-dmg
        run: brew install Bearer/tap/gon create-dmg
      - name: Build macOS app
        env:
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: make build
      - name: Sign DMG with Sparkle and generate appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          SPARKLE_BIN=$(find . ~/Library/Developer/Xcode/DerivedData -name "generate_appcast" -type f 2>/dev/null | head -1)
          echo "Found generate_appcast at: $SPARKLE_BIN"
          mkdir -p build/appcast
          cp build/bin/Markdown-Preview.dmg build/appcast/
          echo "$SPARKLE_KEY" | "$SPARKLE_BIN" --ed-key-file - build/appcast/
          cp build/appcast/appcast.xml build/bin/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/bin/
          retention-days: 5
