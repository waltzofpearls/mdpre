name: Build and release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: List available Xcode versions
        run: ls /Applications | grep Xcode
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show current version of Xcode
        run: xcodebuild -version
      - name: Import macOS app signing certificate
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATES_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATES_PASSWORD }}
      - name: Install gon and create-dmg
        run: brew install Bearer/tap/gon create-dmg
      - name: Build macOS app
        env:
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: make build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            build/bin/Markdown-Preview.dmg
          retention-days: 5

  release:
    needs: build
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: List files
        run: |
          ls -ahl --color
          find . -name "*.dmg"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macos-dmg/Markdown-Preview.dmg
          generate_release_notes: true
