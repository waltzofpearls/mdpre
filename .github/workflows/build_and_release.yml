name: Build and release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: List available Xcode versions
        run: ls /Applications | grep Xcode
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'
      - name: Show current version of Xcode
        run: xcodebuild -version
      - name: Import macOS app signing certificate
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATES_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATES_PASSWORD }}
      - name: Install gon and create-dmg
        run: brew install Bearer/tap/gon create-dmg
      - name: Build macOS app
        env:
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: make build
      - name: Sign DMG with Sparkle and generate appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          SPARKLE_BIN=$(find SourcePackages -name "generate_appcast" -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -name "generate_appcast" -type f 2>/dev/null | head -1)
          fi
          mkdir -p build/appcast
          cp build/bin/Markdown-Preview.dmg build/appcast/
          "$SPARKLE_BIN" build/appcast/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            build/bin/Markdown-Preview.dmg
            build/appcast/appcast.xml
          retention-days: 5

  release:
    needs: build
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: List files
        run: |
          ls -ahl --color
          find . -name "*.dmg" -o -name "appcast.xml"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macos-release/build/bin/Markdown-Preview.dmg
          generate_release_notes: true
      - name: Deploy appcast to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp macos-release/build/appcast/appcast.xml .
          git add appcast.xml
          git commit -m "Update appcast for $(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo 'latest')" || echo "No changes to commit"
          git push origin gh-pages
