<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="highlight-github.min.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="highlight-github-dark.min.css" media="(prefers-color-scheme: dark)">
<script src="highlight.min.js"></script>
<style>
    body {
        margin: 0;
        padding: 0;
    }
    @media (prefers-color-scheme: light) {
        body { background-color: #ffffff; }
    }
    @media (prefers-color-scheme: dark) {
        body { background-color: #1e1e1e; }
    }
    html, body {
        height: 100%;
    }
    #source {
        margin: 0;
        padding: 24px;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-wrap: break-word;
        tab-size: 4;
    }
    pre {
        margin: 0;
    }
    mark.find-highlight {
        background: #ffeb3b;
        color: inherit;
    }
    mark.find-current {
        background: #f9a825;
        border-radius: 2px;
    }
    @media (prefers-color-scheme: dark) {
        mark.find-highlight {
            background: #7b6a1e;
        }
        mark.find-current {
            background: #b8941e;
        }
    }
    @media print {
        mark.find-highlight, mark.find-current {
            background: none;
        }
    }
</style>
</head>
<body>
<pre><code id="source" class="language-markdown"></code></pre>
<script>
    function renderSource(text) {
        const el = document.getElementById('source');
        el.textContent = text;
        hljs.highlightElement(el);
    }

    function setFullWidth(enabled) {
        // No-op for source view — always full width
    }

    // --- Scroll sync (percentage-based) ---

    let ignoreNextScroll = false;

    function getScrollPercent() {
        const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
        const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        if (scrollHeight <= 0) return 0;
        return scrollTop / scrollHeight;
    }

    function scrollToPercent(percent) {
        ignoreNextScroll = true;
        const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        window.scrollTo({ top: percent * scrollHeight });
    }

    window.addEventListener('scroll', () => {
        if (ignoreNextScroll) {
            ignoreNextScroll = false;
            return;
        }
        const percent = getScrollPercent();
        if (window.webkit?.messageHandlers?.scrollSync) {
            window.webkit.messageHandlers.scrollSync.postMessage(percent);
        }
    }, { passive: true });

    // --- Find in page (same as template.html) ---

    let findMatches = [];
    let findIndex = -1;

    function findInPage(query) {
        clearFind();
        if (!query) return JSON.stringify({ total: 0, current: 0 });

        const el = document.getElementById('source');
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);

        const lowerQuery = query.toLowerCase();

        for (const node of textNodes) {
            const parent = node.parentNode;
            if (parent.closest('mark.find-highlight')) continue;

            const text = node.textContent;
            const lower = text.toLowerCase();
            const parts = [];
            let lastIdx = 0;
            let idx;

            while ((idx = lower.indexOf(lowerQuery, lastIdx)) !== -1) {
                if (idx > lastIdx) parts.push(document.createTextNode(text.slice(lastIdx, idx)));
                const mark = document.createElement('mark');
                mark.className = 'find-highlight';
                mark.textContent = text.slice(idx, idx + query.length);
                parts.push(mark);
                findMatches.push(mark);
                lastIdx = idx + query.length;
            }

            if (parts.length > 0) {
                if (lastIdx < text.length) parts.push(document.createTextNode(text.slice(lastIdx)));
                const fragment = document.createDocumentFragment();
                for (const p of parts) fragment.appendChild(p);
                parent.replaceChild(fragment, node);
            }
        }

        if (findMatches.length > 0) {
            findIndex = 0;
            findMatches[0].classList.add('find-current');
            findMatches[0].scrollIntoView({ block: 'center' });
        }
        return JSON.stringify({ total: findMatches.length, current: findMatches.length > 0 ? 1 : 0 });
    }

    function findNext() {
        if (!findMatches.length) return JSON.stringify({ total: 0, current: 0 });
        findMatches[findIndex].classList.remove('find-current');
        findIndex = (findIndex + 1) % findMatches.length;
        findMatches[findIndex].classList.add('find-current');
        findMatches[findIndex].scrollIntoView({ block: 'center' });
        return JSON.stringify({ total: findMatches.length, current: findIndex + 1 });
    }

    function findPrevious() {
        if (!findMatches.length) return JSON.stringify({ total: 0, current: 0 });
        findMatches[findIndex].classList.remove('find-current');
        findIndex = (findIndex - 1 + findMatches.length) % findMatches.length;
        findMatches[findIndex].classList.add('find-current');
        findMatches[findIndex].scrollIntoView({ block: 'center' });
        return JSON.stringify({ total: findMatches.length, current: findIndex + 1 });
    }

    function clearFind() {
        for (const mark of findMatches) {
            const parent = mark.parentNode;
            if (parent) {
                parent.replaceChild(document.createTextNode(mark.textContent), mark);
                parent.normalize();
            }
        }
        findMatches = [];
        findIndex = -1;
    }
</script>
</body>
</html>
