<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="github-markdown.css">
<link rel="stylesheet" href="highlight-github.min.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="highlight-github-dark.min.css" media="(prefers-color-scheme: dark)">
<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<style>
    body {
        margin: 0;
        padding: 0;
    }
    @media (prefers-color-scheme: light) {
        body { background-color: #cecece; }
    }
    @media (prefers-color-scheme: dark) {
        body { background-color: #3b3b3b; }
    }
    .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
        background-color: var(--bgColor-default);
    }
    @media (max-width: 767px) {
        .markdown-body {
            padding: 15px;
        }
    }
    @media print {
        @page {
            size: A4;
            margin: 20mm;
        }
        body {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .markdown-body {
            max-width: none;
            padding: 0;
        }
        pre, code, table, figure, blockquote {
            page-break-inside: avoid;
            break-inside: avoid;
        }
        h1, h2, h3, h4, h5, h6 {
            page-break-after: avoid;
            break-after: avoid;
        }
    }
</style>
</head>
<body>
<article class="markdown-body" id="content"></article>
<script>
    marked.setOptions({
        gfm: true,
        breaks: false,
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        }
    });

    function resolveLocalURL(relative, baseURL, scheme) {
        if (!relative || relative.startsWith('http://') || relative.startsWith('https://') ||
            relative.startsWith('data:') || relative.startsWith('mailto:') || relative.startsWith('#')) {
            return relative;
        }
        try {
            return new URL(relative, baseURL).href.replace(/^file:\/\//, scheme + '://');
        } catch(e) { return relative; }
    }

    function renderMarkdown(text, baseURL) {
        if (baseURL) {
            // Rewrite image URLs BEFORE parsing so the browser never loads stale relative paths
            text = text.replace(/(!\[[^\]]*\]\()([^)]+)(\))/g, function(m, pre, src, post) {
                return pre + resolveLocalURL(src, baseURL, 'mdpre-res') + post;
            });
            text = text.replace(/(<img\b[^>]*\bsrc\s*=\s*["'])([^"']+)(["'])/gi, function(m, pre, src, post) {
                return pre + resolveLocalURL(src, baseURL, 'mdpre-res') + post;
            });
        }
        document.getElementById('content').innerHTML = marked.parse(text);
        if (baseURL) {
            document.querySelectorAll('#content a[href]').forEach(function(a) {
                var href = a.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('http://') ||
                    href.startsWith('https://') || href.startsWith('mailto:')) {
                    return;
                }
                try {
                    var resolved = new URL(href, baseURL).href;
                    a.href = resolved.replace(/^file:\/\//, 'mdpre-file://');
                } catch(e) {}
            });
        }
    }

    function setFullWidth(enabled) {
        var content = document.getElementById('content');
        if (enabled) {
            content.style.maxWidth = 'none';
            content.style.margin = '0';
        }
    }
</script>
</body>
</html>
